<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso de Preparação de Obreiros</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a, #6b21a8);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      width: 90%;
      max-width: 900px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 120px;
      margin-bottom: 20px;
      border-radius: 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #facc15;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 15px;
      color: #38bdf8;
    }

    #lesson {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    ul {
      list-style: none;
      padding: 0;
      text-align: left;
      margin-top: 20px;
    }

    ul li {
      font-size: 18px;
      margin: 10px 0;
      padding-left: 25px;
      position: relative;
      line-height: 1.5;
    }

    ul li::before {
      content: "✦";
      position: absolute;
      left: 0;
      color: #facc15;
      font-size: 18px;
    }

    .controls {
      margin-top: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      background: linear-gradient(45deg, #22c55e, #16a34a);
      border: none;
      color: white;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    .progress {
      font-size: 14px;
      color: #cbd5f5;
      flex: 1;
      text-align: center;
    }

    @media (max-width: 600px) {
      .container {
        padding: 24px;
      }

      h1 {
        font-size: 24px;
      }

      h2 {
        font-size: 20px;
      }

      #lesson {
        font-size: 18px;
      }

      ul li {
        font-size: 16px;
      }

      .controls {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .progress {
        order: -1;
        margin-bottom: 8px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <img src="icon.png" alt="Logo da Igreja" class="logo">

  <h1>Curso de Preparação de Obreiros</h1>
  <h2 id="module"></h2>
  <p id="lesson"></p>
  <ul id="topics"></ul>

  <div class="controls">
    <button onclick="prev()">◀ Anterior</button>
    <div class="progress" id="progress"></div>
    <button onclick="next()">Próximo ▶</button>
  </div>
</div>

<script>
const course = [
  {
    module: "📖 Módulo 1 — Chamado Ministerial",
    lessons: [
      {
        title: "Aula 1 — O Chamado Divino",
        topics: [
          "Chamado antes do nascimento (Jeremias 1:5)",
          "Vocação como iniciativa soberana de Deus",
          "Confirmação espiritual e eclesiástica",
          "Responsabilidade ministerial"
        ]
      },
      {
        title: "Aula 2 — Processos do Chamado",
        topics: [
          "O deserto como lugar de formação",
          "Tempo de preparo oculto",
          "Provação e maturidade",
          "Fruto antes da plataforma"
        ]
      }
    ]
  },
  {
    module: "🔥 Módulo 2 — Caráter e Vida Espiritual",
    lessons: [
      {
        title: "Aula 1 — Santidade",
        topics: [
          "Separação do pecado",
          "Romanos 12 e a transformação da mente",
          "Consistência dentro e fora do púlpito",
          "Vida de oração"
        ]
      },
      {
        title: "Aula 2 — Fruto do Espírito",
        topics: [
          "Gálatas 5:22-23",
          "Caráter acima dos dons",
          "Domínio próprio",
          "Evidência de maturidade espiritual"
        ]
      }
    ]
  },
  {
    module: "📜 Módulo 3 — Doutrinas Bíblicas",
    lessons: [
      {
        title: "Aula 1 — Autoridade das Escrituras",
        topics: [
          "A Bíblia como Palavra inspirada por Deus",
          "Fundamento da fé e da prática cristã",
          "O perigo de opiniões acima da Escritura",
          "Leitura reverente e obediente"
        ]
      },
      {
        title: "Aula 2 — Cristo no Centro",
        topics: [
          "Cristo como revelação perfeita de Deus",
          "A cruz como centro da mensagem",
          "Pregação cristocêntrica",
          "Vida e ministério apontando para Jesus"
        ]
      }
    ]
  }
];

let moduleIndex = 0;
let lessonIndex = 0;

function render() {
  const mod = course[moduleIndex];
  const lesson = mod.lessons[lessonIndex];

  document.getElementById("module").innerText = mod.module;
  document.getElementById("lesson").innerText = lesson.title;

  const topicsList = document.getElementById("topics");
  topicsList.innerHTML = "";

  lesson.topics.forEach(topic => {
    const li = document.createElement("li");
    li.textContent = topic;
    topicsList.appendChild(li);
  });

  document.getElementById("progress").innerText =
    `Módulo ${moduleIndex + 1} | Aula ${lessonIndex + 1} de ${mod.lessons.length}`;
}

function next() {
  if (lessonIndex < course[moduleIndex].lessons.length - 1) {
    lessonIndex++;
  } else if (moduleIndex < course.length - 1) {
    moduleIndex++;
    lessonIndex = 0;
  }
  render();
}

function prev() {
  if (lessonIndex > 0) {
    lessonIndex--;
  } else if (moduleIndex > 0) {
    moduleIndex--;
    lessonIndex = course[moduleIndex].lessons.length - 1;
  }
  render();
}

render();
</script>

</body>
</html>
